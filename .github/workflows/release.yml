name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            rustflags: "-C target-cpu=haswell"
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            rustflags: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            rustflags: "-C target-cpu=haswell"
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            rustflags: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install musl cross-compiler (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          wget -q https://musl.cc/aarch64-linux-musl-cross.tgz
          tar xzf aarch64-linux-musl-cross.tgz -C /opt
          echo "/opt/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

      - name: Build
        run: cargo build --profile dist --target ${{ matrix.target }} -p escapepod-cli
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-musl-gcc
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/dist
          tar czvf ../../../escpod-${{ github.ref_name }}-${{ matrix.target }}.tar.gz escpod
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: escpod-${{ matrix.target }}
          path: escpod-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum escpod-* > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*
