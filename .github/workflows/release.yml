name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos-verify:
    name: macOS verify
    runs-on: macos-latest
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
      - run: cargo clippy --workspace --all-targets

  build:
    name: Build ${{ matrix.target }}
    needs: macos-verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            rustflags: "-C target-cpu=haswell"
            use_cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            rustflags: ""
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            rustflags: "-C target-cpu=haswell"
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            rustflags: ""
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --profile dist --target ${{ matrix.target }} -p escapepod
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --profile dist --target ${{ matrix.target }} -p escapepod
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/dist
          tar czvf ../../../escpod-${{ github.ref_name }}-${{ matrix.target }}.tar.gz escpod
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: escpod-${{ matrix.target }}
          path: escpod-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum escpod-* > SHA256SUMS.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract the section between this version's header and the next
          body=$(awk -v ver="$version" '
            /^## / { if (found) exit; if ($0 ~ ver) found=1; next }
            found { print }
          ' CHANGELOG.md)
          # Write to file to preserve newlines
          echo "$body" > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            artifacts/*
