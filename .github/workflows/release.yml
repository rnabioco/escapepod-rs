name: Release

on:
  push:
    tags:
      - 'v*'

# Default to read-only; only the `release` job that publishes the GitHub
# Release is granted write. The build/verify jobs run dependency build
# scripts and never need a write-capable token.
permissions:
  contents: read

jobs:
  macos-verify:
    name: macOS verify
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets
      - run: cargo clippy --workspace --all-targets

  build:
    name: Build ${{ matrix.target }}
    needs: macos-verify
    runs-on: ${{ matrix.os }}
    # aarch64-musl (peak ~6 min) also compiles `cross` from git first; 30 is safe.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            rustflags: "-C target-cpu=haswell"
            use_cross: false
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            rustflags: ""
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            rustflags: "-C target-cpu=haswell"
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            rustflags: ""
            use_cross: false

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --profile dist --target ${{ matrix.target }} -p escapepod-cli
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --profile dist --target ${{ matrix.target }} -p escapepod-cli
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/dist
          tar czvf ../../../escpod-${{ github.ref_name }}-${{ matrix.target }}.tar.gz escpod
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: escpod-${{ matrix.target }}
          path: escpod-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only this job needs write — it creates the GitHub Release.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum escpod-* > SHA256SUMS.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md not found — cannot build release notes"
            exit 1
          fi
          # Extract the section between this version's header and the next
          body=$(awk -v ver="$version" '
            /^## / { if (found) exit; if ($0 ~ ver) found=1; next }
            found { print }
          ' CHANGELOG.md)
          if [ -z "${body// /}" ]; then
            echo "::warning::No CHANGELOG.md section matched $version — release notes will be sparse"
            body="Release $GITHUB_REF_NAME. See CHANGELOG.md for details."
          fi
          # Write to file to preserve newlines
          echo "$body" > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          files: |
            artifacts/*

  # ---------------------------------------------------------------------------
  # Python wheels → PyPI. Independent of the CLI `release` job above so a wheel
  # failure never blocks the GitHub Release (and vice versa). One abi3 wheel per
  # platform (pyo3 `abi3-py39`), covering CPython 3.9+.
  # ---------------------------------------------------------------------------
  wheels:
    name: Wheel ${{ matrix.target }} (${{ matrix.manylinux }})
    needs: macos-verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            manylinux: musllinux_1_2
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            manylinux: musllinux_1_2
          # `manylinux` is ignored on macOS but keeps the matrix rows uniform.
          - target: x86_64-apple-darwin
            os: macos-latest
            manylinux: auto
          - target: aarch64-apple-darwin
            os: macos-latest
            manylinux: auto
    steps:
      - uses: actions/checkout@v7

      - name: Build wheel
        uses: PyO3/maturin-action@v1.51.0
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist -m crates/escapepod-python/Cargo.toml

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}-${{ matrix.manylinux }}
          path: dist/*.whl

  sdist:
    name: sdist
    needs: macos-verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Build sdist
        uses: PyO3/maturin-action@v1.51.0
        with:
          command: sdist
          args: --out dist -m crates/escapepod-python/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Trusted Publishing (OIDC) — no API token. Requires a PyPI publisher
    # configured for env `pypi`, repo rnabioco/escapepod-rs, workflow release.yml.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheels and sdist
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
