name: Benchmark regression

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Keep criterion output stable and less noisy in CI.
  CRITERION_HOME: /tmp/criterion
  # Small sample counts to keep CI wall time bounded. Real perf work should
  # run benches locally with defaults.
  ESCAPEPOD_BENCH_SAMPLES: "15"
  ESCAPEPOD_BENCH_READS: "80"

jobs:
  bench:
    name: criterion baseline vs. main
    runs-on: ubuntu-latest
    # Don't gate releases on bench noise; surface regressions via the
    # check output but keep the job non-blocking until we have a stable
    # baseline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can check out `main` as a baseline.
          fetch-depth: 0
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Bench main (baseline)
        run: |
          # Run the baseline only for bench targets that already exist on
          # main — a PR that *adds* a bench file would otherwise fail here
          # with "no bench target named X", since criterion has nothing on
          # main to compare against.
          git fetch origin main
          git checkout origin/main
          run_if_present() {
            local pkg="$1" bench="$2"
            if cargo bench -p "$pkg" --bench "$bench" --no-run >/dev/null 2>&1; then
              cargo bench -p "$pkg" --bench "$bench" -- --save-baseline main
            else
              echo "::notice::skipping baseline for $pkg::$bench (not on main)"
            fi
          }
          run_if_present escapepod-signal hot_paths
          run_if_present escapepod-pod5 io_hot_paths

      - name: Bench PR HEAD vs. baseline
        run: |
          # For each bench, compare against the `main` baseline when we
          # captured one; otherwise just record HEAD timings. This keeps the
          # workflow useful even on first-run introductions of a bench.
          git checkout ${{ github.event.pull_request.head.sha || github.sha }}
          bench_diff() {
            local pkg="$1" bench="$2" out="$3"
            if [ -d "$CRITERION_HOME" ] \
                 && find "$CRITERION_HOME" -type d -name main | grep -q .; then
              # A baseline exists somewhere — let criterion decide which groups match.
              cargo bench -p "$pkg" --bench "$bench" -- --baseline-lenient main | tee "$out"
            else
              cargo bench -p "$pkg" --bench "$bench" | tee "$out"
            fi
          }
          bench_diff escapepod-signal hot_paths signal_bench.txt
          bench_diff escapepod-pod5 io_hot_paths pod5_bench.txt

      - name: Flag regressions
        run: |
          # Criterion prints "regressed" on a line when a group shows
          # statistically-significant slowdown. Surface these without failing
          # the build so the PR author sees the hit.
          if grep -E "Performance has regressed" signal_bench.txt pod5_bench.txt; then
            echo "::warning::Criterion detected a regression — inspect the artifact."
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: criterion-output
          path: |
            signal_bench.txt
            pod5_bench.txt
            /tmp/criterion
          retention-days: 14
