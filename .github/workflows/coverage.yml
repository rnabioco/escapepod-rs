name: Coverage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: llvm-cov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        # Library crates covered by `cargo test`: escapepod-pod5,
        # escapepod-signal, escapepod-demux. escapepod-python (pyo3
        # bindings exercised by the Python test harness) and escapepod-cli
        # (binary; command handlers covered end-to-end via compat tests)
        # are intentionally excluded from the lines gate.
        run: >
          cargo llvm-cov
          --package escapepod-pod5
          --package escapepod-signal
          --package escapepod-demux
          --features escapepod-demux/train
          --lcov
          --output-path lcov.info

      - name: Enforce workspace threshold (libraries only)
        run: cargo llvm-cov report --summary-only --fail-under-lines 60

      - name: Upload LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

      - name: Upload HTML report
        if: always()
        run: >
          cargo llvm-cov
          --package escapepod-pod5
          --package escapepod-signal
          --package escapepod-demux
          --features escapepod-demux/train
          --html --output-dir coverage-html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: coverage-html
          retention-days: 14
