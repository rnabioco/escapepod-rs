name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: llvm-cov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: >
          cargo llvm-cov
          --workspace
          --features demux
          --lcov
          --output-path lcov.info

      - name: Enforce per-crate thresholds
        run: cargo llvm-cov report --summary-only --fail-under-lines 70

      - name: Upload LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

      - name: Upload HTML report
        if: always()
        run: cargo llvm-cov --workspace --features demux --html --output-dir coverage-html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: coverage-html
          retention-days: 14
