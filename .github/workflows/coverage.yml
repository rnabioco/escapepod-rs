name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: llvm-cov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        # Exclude escapepod-python (pyo3 bindings exercised only by the Python
        # test harness, not by `cargo test`) and escapepod-cli (binary;
        # command handlers are best covered end-to-end via compat tests).
        # The gate applies to the two library crates that `cargo test` actually
        # exercises: escapepod-pod5 and escapepod-signal.
        run: >
          cargo llvm-cov
          --workspace
          --exclude escapepod-python
          --exclude escapepod-cli
          --features demux
          --lcov
          --output-path lcov.info

      - name: Enforce workspace threshold (libraries only)
        run: cargo llvm-cov report --summary-only --fail-under-lines 60

      - name: Upload LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

      - name: Upload HTML report
        if: always()
        run: >
          cargo llvm-cov
          --workspace
          --exclude escapepod-python
          --exclude escapepod-cli
          --features demux
          --html --output-dir coverage-html

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: coverage-html
          retention-days: 14
