site_name: escapepod-rs
site_description: Rust library and CLI for Oxford Nanopore POD5 files
site_url: https://rnabioco.github.io/escapepod-rs
repo_url: https://github.com/rnabioco/escapepod-rs
repo_name: rnabioco/escapepod-rs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - CLI Reference:
      - Overview: cli/index.md
      - summary: cli/summary.md
      - view: cli/view.md
      - inspect: cli/inspect.md
      - merge: cli/merge.md
      - filter: cli/filter.md
      - bam-filter: cli/bam-filter.md
      - repack: cli/repack.md
      - subset: cli/subset.md
      - demux: cli/demux.md
      - resquiggle: cli/resquiggle.md
  - Library:
      - Overview: library/index.md
      - Reading Files: library/reading.md
      - Writing Files: library/writing.md
      - Data Types: library/types.md
  - File Format:
      - Overview: format/index.md
      - Container Structure: format/container.md
      - Signal Compression: format/compression.md
  - API Reference: api/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rnabioco/escapepod-rs

copyright: Copyright &copy; 2025 RNA Bioscience Initiative
