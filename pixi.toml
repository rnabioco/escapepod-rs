[workspace]
name = "escapepod-rs"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
samtools = ">=1.23,<2"
pysam = "*"
pandas = "*"
pyarrow = ">=22,<23"
pip = "*"
# mold is a base dependency so every environment links Rust with it — see the
# LD_PRELOAD/MOLD_PATH block below. gcc 11.5 on the compute nodes has no
# `-fuse-ld=mold` support, so we engage mold via its `mold-wrapper.so`
# LD_PRELOAD interposer (exactly what `mold -run` does) rather than a cargo
# linker override in .cargo/config.toml.
mold = ">=2.4"

# LD_PRELOAD makes mold the default linker for *every* command run in any pixi
# environment (bare `cargo build`, `cargo nextest run`, maturin, …), full time —
# not just the dev-env task wrappers. `mold-wrapper.so` intercepts the linker
# exec and redirects it to mold; for non-linker processes it is an inert
# passthrough. `$CONDA_PREFIX` resolves to the active env prefix, so this works
# uniformly across default/dev/python-test/gpu/… without hardcoding a path.
[activation]
env = { DORADO_VERSION = "1.4.0", DORADO_DIR = "$PIXI_PROJECT_ROOT/.pixi/tools", PATH = "$DORADO_DIR/dorado-$DORADO_VERSION-linux-x64/bin:$PATH", LD_PRELOAD = "$CONDA_PREFIX/lib/mold/mold-wrapper.so", MOLD_PATH = "$CONDA_PREFIX/bin/mold" }

[tasks]
install-dorado = """
mkdir -p $DORADO_DIR && \
curl -L https://cdn.oxfordnanoportal.com/software/analysis/dorado-$DORADO_VERSION-linux-x64.tar.gz | \
tar -xz -C $DORADO_DIR
"""
install-pod5 = "pip install 'pod5>=0.3.36,<0.4'"

# Python bindings test feature
[feature.python-test.dependencies]
python = ">=3.10"
numpy = "*"

[feature.python-test.pypi-dependencies]
maturin = ">=1.9,<2"
pytest = "*"
pod5 = ">=0.3.36,<0.4"
ruff = ">=0.15.21, <0.16"
ty = ">=0.0.58, <0.0.59"

[feature.python-test.tasks]
build-python = "maturin develop --manifest-path crates/escapepod-python/Cargo.toml"
test-python = { cmd = "pytest tests/python/ -v", depends-on = ["build-python"] }
test-compat = "python tests/compat/test_pod5_compat.py"
lint-python = "ruff check tests/python && ruff format --check tests/python"
# ty resolves `import escapepod` from the built extension, so build first.
typecheck-python = { cmd = "ty check tests/python crates/escapepod-python/escapepod.pyi", depends-on = [
  "build-python",
] }

# GPU (CUDA) feature. Covers two runtime paths, both `load-dynamic`/dlopen
# (nothing needed at build time):
#   * `--features gpu`      — cudarc dlopens libnvrtc for the GPU DTW kernels.
#   * `--features cnn-gpu`  — the `ort` CUDA execution provider for batched CNN
#     adapter detection. ORT 1.24's CUDA EP dlopens cublas/cublasLt/cudart/cufft
#     AND cuDNN 9; without them it fails with
#     `libcublasLt.so.12: cannot open shared object file` and silently falls back
#     to CPU. We pull the whole CUDA 12 runtime from conda-forge so `pixi -e gpu`
#     is self-contained (no cross-repo env on LD_LIBRARY_PATH). See the memory
#     `reference-cnn-gpu-ort-runtime-setup` for the full story.
# Activate with `pixi shell -e gpu` or `pixi run -e gpu …` on a GPU node.
[feature.gpu.dependencies]
cuda-nvrtc = ">=12"        # GPU DTW (cudarc)
cuda-version = "12.*"
libcublas = "*"            # ort CUDA EP: libcublas.so.12 + libcublasLt.so.12
cuda-cudart = "*"          # ort CUDA EP: libcudart.so.12
libcufft = "*"             # ort CUDA EP: libcufft.so.11
cudnn = ">=9,<10"          # ort CUDA EP: libcudnn.so.9 (ORT 1.24 needs cuDNN 9)

# Make `$CONDA_PREFIX/lib` visible to the dlopen paths above (cudarc's libnvrtc
# and ort's CUDA EP deps) — the conda-forge CUDA packages ship no activation
# hook that sets this. `ORT_DYLIB_PATH` points `ort` (load-dynamic) at a
# CUDA-enabled libonnxruntime 1.24.x; the manual onnxruntime-gpu download lives
# under ~/ortgpu (not on PyPI/conda for this exact build). Override it if yours
# is elsewhere.
[feature.gpu.activation]
env = { LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH", ORT_DYLIB_PATH = "$HOME/ortgpu/onnxruntime/capi/libonnxruntime.so.1.24.4" }

# WarpDemuX benchmark feature. Neither `warpdemux` nor `adapted` is on
# PyPI, so we pip-install them editable from the cloned repos under
# `ext/`. Build deps (numpy, cython) come from conda-forge to work
# around ADAPTed's missing `[build-system]` block; runtime deps are
# pre-resolved via conda-forge where possible to keep pip lightweight.
# Run `pixi run -e warpdemux-bench install-warpdemux` once after cloning
# the submodules to bootstrap; the benchmark script then invokes
# `pixi run -e warpdemux-bench …` for the Python tools.
[feature.warpdemux-bench.dependencies]
# Pinned to 3.12: ADAPTed's `@dataclass` patterns with mutable defaults
# break on Python 3.13's stricter checks.
python = ">=3.11,<3.13"
hyperfine = "*"
pip = "*"
numpy = "*"
cython = "*"
setuptools = "*"
wheel = "*"
scipy = "*"
scikit-learn = "*"
pandas = "*"
tqdm = "*"
bottleneck = "*"
pytorch = "*"
h5py = "*"
toml = "*"
psutil = "*"
attrs = "*"
matplotlib = "*"
catboost = "*"
joblib = "*"
ruptures = "*"
grpcio = "*"

[feature.warpdemux-bench.pypi-dependencies]
pod5 = ">=0.3.36,<0.4"
dtaidistance = "*"
vbz-h5py-plugin = "*"
# Required by `torch.onnx.export` on torch 2.x (ONNX exporter moved to
# onnxscript-backed tracing); also onnxruntime for the post-export smoke
# test inside scripts/export_adapter_cnn_to_onnx.py.
onnxscript = "*"
onnxruntime = "*"

[feature.warpdemux-bench.tasks]
# The sed step patches ADAPTed's SigProcConfig, which uses mutable class
# instances as dataclass defaults — disallowed on modern Python. The
# upstream repo hasn't released a fix, so we rewrite to
# `field(default_factory=...)` in place before the editable install.
install-warpdemux = """
python scripts/patch_adapted_dataclass.py ext/ADAPTed/adapted/config && \
pip install --no-build-isolation --no-deps -e ext/ADAPTed -e ext/WarpDemuX
"""

# Documentation feature (zensical site build). Terminal-demo gif regeneration is
# deliberately NOT here: VHS drives a headless Chromium + ffmpeg that is too heavy
# for the cluster, so it runs macOS-local via Homebrew — see docs/tapes/README.md.
[feature.docs.dependencies]
python = ">=3.10"

[feature.docs.pypi-dependencies]
zensical = "*"

[feature.docs.tasks]
docs-build = "zensical build"
docs-serve = "zensical serve"
# Mirrors the CI docs gate. --clean forces a cold cache: zensical's incremental
# cache makes --strict link validation nondeterministic (cached pages spuriously
# report "page does not exist"), so run the strict check against a fresh cache.
docs-check = "zensical build --clean --strict"

# Dev env: cargo-nextest plus convenience task wrappers. mold linking is no
# longer opt-in here — it is on for *every* environment via the base
# LD_PRELOAD/MOLD_PATH activation above, so these tasks no longer need the
# `mold -run` prefix (a bare `cargo …` already links with mold). GH Release
# binaries are built in CI against musl and are unaffected.
[feature.dev.dependencies]
cargo-nextest = ">=0.9"

[feature.dev.tasks]
build = "cargo build"
build-rel = "cargo build --release"
# nextest does not run doctests; use the test-doc task for those.
test = "cargo nextest run"
test-doc = "cargo test --doc"
check = "cargo check"
clippy = "cargo clippy --workspace --all-targets"

[environments]
python-test = { features = ["python-test"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
gpu = { features = ["gpu"], solve-group = "default" }
warpdemux-bench = { features = ["warpdemux-bench"], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
# dev + gpu combo for GPU work that still wants mold linking.
dev-gpu = { features = ["dev", "gpu"], solve-group = "default" }
