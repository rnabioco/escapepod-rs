[workspace]
name = "escapepod-rs"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
samtools = ">=1.23,<2"
pysam = "*"
pandas = "*"
pyarrow = ">=22,<23"
pip = "*"

[activation]
env = { DORADO_VERSION = "1.3.0", PATH = "$PIXI_CACHE_DIR/tools/dorado-$DORADO_VERSION-linux-x64/bin:$PATH" }

[tasks]
install-dorado = """
mkdir -p $PIXI_CACHE_DIR/tools && \
curl -L https://cdn.oxfordnanoportal.com/software/analysis/dorado-$DORADO_VERSION-linux-x64.tar.gz | \
tar -xz -C $PIXI_CACHE_DIR/tools
"""
install-pod5 = "pip install 'pod5>=0.3.36,<0.4'"
