[workspace]
name = "escapepod-rs"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
samtools = ">=1.23,<2"
pysam = "*"
pandas = "*"
pyarrow = ">=22,<23"
pip = "*"

[activation]
env = { DORADO_VERSION = "1.4.0", DORADO_DIR = "$PIXI_PROJECT_ROOT/.pixi/tools", PATH = "$DORADO_DIR/dorado-$DORADO_VERSION-linux-x64/bin:$PATH" }

[tasks]
install-dorado = """
mkdir -p $DORADO_DIR && \
curl -L https://cdn.oxfordnanoportal.com/software/analysis/dorado-$DORADO_VERSION-linux-x64.tar.gz | \
tar -xz -C $DORADO_DIR
"""
install-pod5 = "pip install 'pod5>=0.3.36,<0.4'"

# Python bindings test feature
[feature.python-test.dependencies]
python = ">=3.10"
numpy = "*"

[feature.python-test.pypi-dependencies]
maturin = ">=1.8,<2"
pytest = "*"
pod5 = ">=0.3.36,<0.4"

[feature.python-test.tasks]
build-python = "maturin develop --manifest-path crates/escapepod-python/Cargo.toml"
test-python = { cmd = "pytest tests/python/ -v", depends-on = ["build-python"] }
test-compat = "python tests/compat/test_pod5_compat.py"

# GPU (CUDA) feature for escpod's `--features gpu` path. Provides the runtime
# NVRTC library that cudarc dlopens on first use. Activate with
# `pixi shell -e gpu` or `pixi run -e gpu cargo test --features gpu ...`.
[feature.gpu.dependencies]
cuda-nvrtc = ">=12"
cuda-version = "12.*"

# Make `$CONDA_PREFIX/lib` visible to cudarc's dlopen — the conda-forge
# cuda-nvrtc package does not ship an activation hook that sets this.
[feature.gpu.activation]
env = { LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH" }

# WarpDemuX benchmark feature. Neither `warpdemux` nor `adapted` is on
# PyPI, so we pip-install them editable from the cloned repos under
# `ext/`. Build deps (numpy, cython) come from conda-forge to work
# around ADAPTed's missing `[build-system]` block; runtime deps are
# pre-resolved via conda-forge where possible to keep pip lightweight.
# Run `pixi run -e warpdemux-bench install-warpdemux` once after cloning
# the submodules to bootstrap; the benchmark script then invokes
# `pixi run -e warpdemux-bench …` for the Python tools.
[feature.warpdemux-bench.dependencies]
# Pinned to 3.12: ADAPTed's `@dataclass` patterns with mutable defaults
# break on Python 3.13's stricter checks.
python = ">=3.11,<3.13"
hyperfine = "*"
pip = "*"
numpy = "*"
cython = "*"
setuptools = "*"
wheel = "*"
scipy = "*"
scikit-learn = "*"
pandas = "*"
tqdm = "*"
bottleneck = "*"
pytorch = "*"
h5py = "*"
toml = "*"
psutil = "*"
attrs = "*"
matplotlib = "*"
catboost = "*"
joblib = "*"
ruptures = "*"
grpcio = "*"

[feature.warpdemux-bench.pypi-dependencies]
pod5 = ">=0.3.36,<0.4"
dtaidistance = "*"
vbz-h5py-plugin = "*"
# Required by `torch.onnx.export` on torch 2.x (ONNX exporter moved to
# onnxscript-backed tracing); also onnxruntime for the post-export smoke
# test inside scripts/export_adapter_cnn_to_onnx.py.
onnxscript = "*"
onnxruntime = "*"

[feature.warpdemux-bench.tasks]
# The sed step patches ADAPTed's SigProcConfig, which uses mutable class
# instances as dataclass defaults — disallowed on modern Python. The
# upstream repo hasn't released a fix, so we rewrite to
# `field(default_factory=...)` in place before the editable install.
install-warpdemux = """
python scripts/patch_adapted_dataclass.py ext/ADAPTed/adapted/config && \
pip install --no-build-isolation --no-deps -e ext/ADAPTed -e ext/WarpDemuX
"""

# Documentation feature
[feature.docs.dependencies]
python = ">=3.10"

[feature.docs.pypi-dependencies]
zensical = "*"

[feature.docs.tasks]
docs-build = "zensical build"
docs-serve = "zensical serve"

# Fast local dev builds via mold. The task wrappers use `mold -run`, which
# intercepts the linker exec via LD_PRELOAD and works with the system gcc
# 11.5 on the compute nodes — no `-fuse-ld=mold` support required, and no
# glibc-static (the previous conda-clang attempt hit that wall, see
# .cargo/config.toml). GH Release binaries are built in CI against musl
# and are unaffected by this feature.
[feature.dev.dependencies]
mold = ">=2.4"
cargo-nextest = ">=0.9"

[feature.dev.tasks]
build = "mold -run cargo build"
build-rel = "mold -run cargo build --release"
# nextest does not run doctests; use the test-doc task for those.
test = "mold -run cargo nextest run"
test-doc = "mold -run cargo test --doc"
check = "mold -run cargo check"
clippy = "mold -run cargo clippy --workspace --all-targets"

[environments]
python-test = { features = ["python-test"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
gpu = { features = ["gpu"], solve-group = "default" }
warpdemux-bench = { features = ["warpdemux-bench"], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
# dev + gpu combo for GPU work that still wants mold linking.
dev-gpu = { features = ["dev", "gpu"], solve-group = "default" }
