[workspace]
resolver = "2"
members = ["escapepod-cli", "escapepod"]

[workspace.package]
version = "0.1.0-alpha.2"
edition = "2021"
rust-version = "1.85"
repository = "https://github.com/rnabioco/escapepod-rs"
license = "MIT"

[workspace.dependencies]
# Arrow ecosystem
arrow = { version = "57", default-features = false, features = ["ipc"] }
byteorder = "1"
# CLI
clap = { version = "4", features = ["derive"] }
# Serialization
flatbuffers = "25"
indicatif = "0.18"
# I/O
memmap2 = "0.9"
# Workspace crates
escapepod = { path = "escapepod" }
rayon = "1"
# Error handling
anyhow = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
# Compression
zstd = "0.13"
