[workspace]
resolver = "2"
members = ["escapepod", "escapepod-cli"]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
repository = "https://github.com/rnabioco/escapepod-rs"
license = "MIT"

[workspace.dependencies]
# Error handling
anyhow = "1"
# Arrow ecosystem
arrow = { version = "58", default-features = false, features = ["ipc"] }
byteorder = "1"
# CLI
clap = { version = "4", features = ["derive"] }
# Workspace crates
escapepod = { path = "escapepod" }
# Serialization
flatbuffers = "25"
indicatif = "0.18"
# I/O
memmap2 = "0.9"
rayon = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
# Compression
zstd = "0.13"

[profile.profiling]
inherits = "release"
debug = true
strip = false
# Enable frame pointers for accurate call stacks
[profile.profiling.build-override]
debug = true

[profile.dist]
inherits = "release"
lto = true
codegen-units = 1
strip = true
panic = "abort"
