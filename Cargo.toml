[workspace]
resolver = "2"
members = ["escapepod", "escapepod-cli", "escapepod-python", "escapepod-vortex"]

[workspace.package]
version = "0.1.2"
edition = "2024"
rust-version = "1.88"
repository = "https://github.com/rnabioco/escapepod-rs"
license = "MIT"

[workspace.dependencies]
# Error handling
anyhow = "1"
# Arrow ecosystem
arrow = { version = "58", default-features = false, features = ["ipc"] }
byteorder = "1"
# CLI
clap = { version = "4", features = ["derive"] }
# Workspace crates
escapepod = { path = "escapepod", version = "0.1.2" }
# Serialization
flatbuffers = "25"
indicatif = "0.18"
# I/O
memmap2 = "0.9"
rayon = "1"
thiserror = "2"
uuid = { version = "1", features = ["v4"] }
# Compression
zstd = "0.13"
# Python bindings
pyo3 = { version = "0.28", features = ["extension-module"] }
numpy = "0.28"

[profile.release]
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"

# `cargo bench` uses [profile.bench], which by default does NOT inherit from
# [profile.release]. Pin it here so microbenchmarks measure the same codegen
# (LTO, single codegen unit) that ships in the release binary. `strip` and
# `panic = "abort"` are omitted: criterion needs symbols and unwinding.
[profile.bench]
inherits = "release"
strip = false
panic = "unwind"

[profile.profiling]
inherits = "release"
debug = true
strip = false
# Enable frame pointers for accurate call stacks
[profile.profiling.build-override]
debug = true

[profile.dist]
inherits = "release"
